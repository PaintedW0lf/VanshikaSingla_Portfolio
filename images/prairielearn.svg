<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#2a2a5a"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg2)"/>
  <!-- AI/Brain icon -->
  <text x="300" y="130" font-size="64" text-anchor="middle">🧠</text>
  <!-- Document with checkmark icons -->
  <g transform="translate(200, 155)">
    <rect x="0" y="0" width="60" height="75" rx="6" fill="#2a2a5a" stroke="#f59e0b" stroke-width="2"/>
    <line x1="12" y1="20" x2="48" y2="20" stroke="#B0B0B0" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="32" x2="40" y2="32" stroke="#B0B0B0" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="44" x2="44" y2="44" stroke="#B0B0B0" stroke-width="2" stroke-linecap="round"/>
    <text x="30" y="68" font-size="20" text-anchor="middle" fill="#4ade80">✓</text>
  </g>
  <!-- Arrow -->
  <text x="300" y="205" font-size="28" text-anchor="middle" fill="#f59e0b">→</text>
  <!-- AI output -->
  <g transform="translate(340, 155)">
    <rect x="0" y="0" width="60" height="75" rx="6" fill="#2a2a5a" stroke="#8b5cf6" stroke-width="2"/>
    <text x="30" y="28" font-size="16" text-anchor="middle" fill="#f59e0b">A+</text>
    <line x1="12" y1="42" x2="48" y2="42" stroke="#B0B0B0" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="54" x2="40" y2="54" stroke="#B0B0B0" stroke-width="2" stroke-linecap="round"/>
    <text x="30" y="72" font-size="14" text-anchor="middle" fill="#4ade80">💬</text>
  </g>
  <!-- Title -->
  <text x="300" y="290" font-family="Inter, sans-serif" font-size="20" font-weight="700" text-anchor="middle" fill="url(#gold2)">LLM-Based Auto Grading</text>
  <text x="300" y="315" font-family="Inter, sans-serif" font-size="14" text-anchor="middle" fill="#B0B0B0">PrairieLearn · Gemini · OpenAI</text>
  <!-- Directed Studies badge -->
  <rect x="200" y="340" width="200" height="28" rx="14" fill="rgba(139,92,246,0.3)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="300" y="359" font-family="Inter, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#8b5cf6">📚 Directed Studies · UBC</text>
</svg>
