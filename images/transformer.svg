<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#2a2a5a"/>
    </linearGradient>
    <linearGradient id="gold3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg3)"/>
  <!-- Neural network nodes -->
  <!-- Input layer -->
  <circle cx="180" cy="120" r="14" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="180" cy="170" r="14" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="180" cy="220" r="14" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <!-- Hidden layer 1 -->
  <circle cx="270" cy="100" r="14" fill="none" stroke="#8b5cf6" stroke-width="2"/>
  <circle cx="270" cy="150" r="14" fill="none" stroke="#8b5cf6" stroke-width="2"/>
  <circle cx="270" cy="200" r="14" fill="none" stroke="#8b5cf6" stroke-width="2"/>
  <circle cx="270" cy="250" r="14" fill="none" stroke="#8b5cf6" stroke-width="2"/>
  <!-- Hidden layer 2 -->
  <circle cx="360" cy="100" r="14" fill="none" stroke="#8b5cf6" stroke-width="2"/>
  <circle cx="360" cy="150" r="14" fill="none" stroke="#8b5cf6" stroke-width="2"/>
  <circle cx="360" cy="200" r="14" fill="none" stroke="#8b5cf6" stroke-width="2"/>
