  <!-- Output layer -->
  <circle cx="440" cy="140" r="14" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="440" cy="200" r="14" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <!-- Connections (selected for clarity) -->
  <line x1="194" y1="120" x2="256" y2="100" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  <line x1="194" y1="120" x2="256" y2="150" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  <line x1="194" y1="170" x2="256" y2="150" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  <line x1="194" y1="170" x2="256" y2="200" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  <line x1="194" y1="220" x2="256" y2="200" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  <line x1="194" y1="220" x2="256" y2="250" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  <line x1="284" y1="100" x2="346" y2="100" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
  <line x1="284" y1="150" x2="346" y2="150" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
  <line x1="284" y1="200" x2="346" y2="200" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
  <line x1="284" y1="250" x2="346" y2="250" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
  <line x1="284" y1="100" x2="346" y2="150" stroke="#8b5cf6" stroke-width="1" opacity="0.2"/>
  <line x1="284" y1="150" x2="346" y2="200" stroke="#8b5cf6" stroke-width="1" opacity="0.2"/>
  <line x1="374" y1="100" x2="426" y2="140" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  <line x1="374" y1="150" x2="426" y2="140" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  <line x1="374" y1="200" x2="426" y2="200" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  <line x1="374" y1="250" x2="426" y2="200" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  <!-- Attention head label -->
  <text x="315" y="55" font-family="Inter, sans-serif" font-size="11" text-anchor="middle" fill="#8b5cf6" font-weight="600">Multi-Head Attention</text>
  <!-- Title -->
  <text x="300" y="310" font-family="Inter, sans-serif" font-size="20" font-weight="700" text-anchor="middle" fill="url(#gold3)">Transformer from Scratch</text>
  <text x="300" y="335" font-family="Inter, sans-serif" font-size="14" text-anchor="middle" fill="#B0B0B0">PyTorch · Attention · Bias Analysis</text>
  <!-- Directed Studies badge -->
  <rect x="200" y="352" width="200" height="28" rx="14" fill="rgba(139,92,246,0.3)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="300" y="371" font-family="Inter, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#8b5cf6">📚 Directed Studies · UBC</text>
</svg>
