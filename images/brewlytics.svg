<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#2a2a5a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Coffee cup icon -->
  <text x="300" y="140" font-size="72" text-anchor="middle" fill="#f59e0b">☕</text>
  <!-- Chart bars -->
  <rect x="170" y="200" width="40" height="80" rx="4" fill="#f59e0b" opacity="0.6"/>
  <rect x="220" y="180" width="40" height="100" rx="4" fill="#f59e0b" opacity="0.7"/>
  <rect x="270" y="160" width="40" height="120" rx="4" fill="#f59e0b" opacity="0.8"/>
  <rect x="320" y="170" width="40" height="110" rx="4" fill="#8b5cf6" opacity="0.7"/>
  <rect x="370" y="190" width="40" height="90" rx="4" fill="#8b5cf6" opacity="0.6"/>
  <!-- Title -->
  <text x="300" y="330" font-family="Inter, sans-serif" font-size="24" font-weight="700" text-anchor="middle" fill="url(#gold)">Brewlytics</text>
  <text x="300" y="358" font-family="Inter, sans-serif" font-size="14" text-anchor="middle" fill="#B0B0B0">Digital Twin · Monte Carlo · DES</text>
  <!-- Hackathon badge -->
  <rect x="195" y="10" width="210" height="32" rx="16" fill="#f59e0b"/>
  <text x="300" y="32" font-family="Inter, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#0a0e27">🏆 Hackathon Winner 2026</text>
</svg>
